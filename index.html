<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TXT 转 sub2api JSON</title>
  <style>
    :root {
      --bg: #f6f7f8;
      --panel: #ffffff;
      --text: #202124;
      --muted: #64717d;
      --line: #d9dee3;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --danger: #b91c1c;
      --code: #f1f5f9;
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
    }
    header {
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .bar, main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px 20px;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }
    .panel-head {
      border-bottom: 1px solid var(--line);
      background: #eef2f6;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .panel-head strong { font-size: 13px; }
    .panel-body { padding: 12px; }
    textarea {
      width: 100%;
      min-height: 320px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--code);
      color: var(--text);
      padding: 10px;
      font: 12px/1.5 Consolas, "SFMono-Regular", monospace;
      overflow-wrap: anywhere;
    }
    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      padding: 8px 11px;
      font: inherit;
      cursor: pointer;
      min-height: 34px;
      white-space: nowrap;
    }
    button:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }
    button.secondary {
      background: #fff;
      border-color: var(--line);
      color: var(--text);
    }
    button.secondary:hover { background: #eef2f6; }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 0 14px;
    }
    .stat {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 11px;
      min-width: 112px;
    }
    .stat strong {
      display: block;
      font-size: 18px;
      line-height: 1.1;
    }
    .stat span {
      color: var(--muted);
      font-size: 12px;
    }
    .notice {
      display: none;
      border: 1px solid #fecaca;
      background: #fef2f2;
      color: var(--danger);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }
    .notice.show { display: block; }
    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: auto;
      background: #fff;
      max-height: 360px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      position: sticky;
      top: 0;
      background: #eef2f6;
      font-size: 12px;
      color: #334155;
      z-index: 1;
    }
    td.mono {
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .muted { color: var(--muted); }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      textarea { min-height: 240px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <h1>TXT 转 sub2api JSON</h1>
    </div>
  </header>
  <main>
    <div id="notice" class="notice"></div>
    <div class="stats">
      <div class="stat"><strong id="totalCount">0</strong><span>解析账号</span></div>
      <div class="stat"><strong id="badCount">0</strong><span>异常行</span></div>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="panel-head">
          <strong>输入 TXT 字符串</strong>
          <span class="muted">一行一个账号，字段用 ---- 分隔</span>
        </div>
        <div class="panel-body">
          <textarea id="input" spellcheck="false" placeholder="phone----password----access_token----account_id----chatgpt_account_id----chatgpt_account_user_id----chatgpt_auth_user_id----chatgpt_plan_type----chatgpt_user_id----email----expires_at----id_token----refresh_token"></textarea>
          <div class="actions">
            <button type="button" id="convertBtn">转换</button>
            <button type="button" id="clearBtn" class="secondary">清空</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <strong>sub2api JSON</strong>
          <div class="actions" style="margin:0">
            <button type="button" id="copyJsonBtn" class="secondary">复制 JSON</button>
            <button type="button" id="downloadJsonBtn" class="secondary">下载 JSON</button>
          </div>
        </div>
        <div class="panel-body">
          <textarea id="output" readonly spellcheck="false"></textarea>
        </div>
      </section>
    </div>

    <section class="panel" style="margin-top:14px">
      <div class="panel-head">
        <strong>账号和密码</strong>
        <button type="button" id="copyAccountsBtn" class="secondary">复制账号密码</button>
      </div>
      <div class="panel-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>phone</th>
                <th>password</th>
                <th>email</th>
              </tr>
            </thead>
            <tbody id="accountsBody">
              <tr><td colspan="4" class="muted">还没有解析内容。</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script>
    const SUB_FIELDS = [
      "access_token",
      "account_id",
      "chatgpt_account_id",
      "chatgpt_account_user_id",
      "chatgpt_auth_user_id",
      "chatgpt_plan_type",
      "chatgpt_user_id",
      "email",
      "expires_at",
      "id_token",
      "refresh_token"
    ];

    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const accountsBody = document.getElementById("accountsBody");
    const notice = document.getElementById("notice");
    const totalCount = document.getElementById("totalCount");
    const badCount = document.getElementById("badCount");
    let lastAccounts = [];

    function normalizeExpires(value) {
      const text = String(value || "").trim();
      return /^\d+$/.test(text) ? Number(text) : text;
    }

    function parseLines(text) {
      const accounts = [];
      const badLines = [];
      const lines = text.split(/\r?\n/);
      lines.forEach((line, index) => {
        const raw = line.trim();
        if (!raw) return;
        const parts = raw.split("----");
        if (parts.length < 13) {
          badLines.push(`第 ${index + 1} 行字段不足：${parts.length}/13`);
          return;
        }
        const phone = parts[0] || "";
        const password = parts[1] || "";
        const credentials = {};
        SUB_FIELDS.forEach((field, fieldIndex) => {
          const value = parts[fieldIndex + 2] || "";
          credentials[field] = field === "expires_at" ? normalizeExpires(value) : value;
        });
        const name = credentials.email || phone || `account-${accounts.length + 1}`;
        accounts.push({
          phone,
          password,
          name,
          platform: "openai",
          type: "oauth",
          credentials,
          extra: { privacy_mode: "training_off" },
          concurrency: 10,
          priority: 1,
          rate_multiplier: 1,
          auto_pause_on_expired: true
        });
      });
      return { accounts, badLines };
    }

    function buildSubJson(accounts) {
      return {
        exported_at: new Date().toISOString().replace(/\.\d{3}Z$/, "Z"),
        proxies: [],
        accounts: accounts.map(({ phone, password, ...account }) => account)
      };
    }

    function renderAccounts(accounts) {
      accountsBody.innerHTML = "";
      if (!accounts.length) {
        accountsBody.innerHTML = '<tr><td colspan="4" class="muted">还没有解析内容。</td></tr>';
        return;
      }
      accounts.forEach((account, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${index + 1}</td>
          <td class="mono">${escapeHtml(account.phone)}</td>
          <td class="mono">${escapeHtml(account.password)}</td>
          <td>${escapeHtml(account.credentials.email || "")}</td>
        `;
        accountsBody.appendChild(row);
      });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function convert() {
      const { accounts, badLines } = parseLines(input.value);
      lastAccounts = accounts;
      output.value = JSON.stringify(buildSubJson(accounts), null, 2);
      renderAccounts(accounts);
      totalCount.textContent = String(accounts.length);
      badCount.textContent = String(badLines.length);
      notice.textContent = badLines.join("\\n");
      notice.classList.toggle("show", badLines.length > 0);
    }

    async function copyText(text) {
      await navigator.clipboard.writeText(text);
    }

    function download(filename, text, type) {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    document.getElementById("convertBtn").addEventListener("click", convert);
    input.addEventListener("input", convert);
    document.getElementById("clearBtn").addEventListener("click", () => {
      input.value = "";
      convert();
      input.focus();
    });
    document.getElementById("copyJsonBtn").addEventListener("click", () => copyText(output.value));
    document.getElementById("downloadJsonBtn").addEventListener("click", () => {
      if (!output.value) convert();
      download("sub2api-account-converted.json", output.value, "application/json;charset=utf-8");
    });
    document.getElementById("copyAccountsBtn").addEventListener("click", () => {
      const text = lastAccounts.map((account) => `${account.phone}----${account.password}`).join("\\n");
      copyText(text);
    });
    convert();
  </script>
</body>
</html>
